motors:
  ids: [1, 2, 3, 4, 5, 6, 7]
  names:
    - "motor_01"
    - "motor_02"
    - "motor_03"
    - "motor_04"
    - "motor_05"
    - "motor_06"
    - "motor_07"
  enabled: [1, 2, 3, 4, 5, 6, 7]

serial:
  port: "/dev/ttyUSB0"
  baudrate: 115200
  read_timeout: 0.02
  write_timeout: 0.02
  read_chunk_size: 256
  flush_input_before_round: true
  sync_timeout: 2.0
  sync_cycles_required: 3

control:
  max_torque: [40.0, 40.0, 27.0, 27.0, 7.0, 7.0, 9.0]

step_torque:
  initial_torque: 0.0
  torque_step: 0.1
  hold_duration: 1.0
  velocity_limit: 10.0

output:
  results_dir: "results"
  summary_filename: "hardware_identification_summary.npz"
  summary_csv_filename: "hardware_identification_summary.csv"
  summary_report_filename: "hardware_identification_summary.md"
